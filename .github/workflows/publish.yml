name: Publish Extension

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate extension
        run: |
          npm run compile
          npm run lint

      - name: Resolve version
        id: version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "$TAG_VERSION" != "$PACKAGE_VERSION" ]]; then
              echo "Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
              exit 1
            fi
            VERSION="$TAG_VERSION"
          else
            VERSION="$PACKAGE_VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "vsix_name=deepseek-balance-$VERSION.vsix" >> "$GITHUB_OUTPUT"

      - name: Package VSIX
        run: npx @vscode/vsce package --allow-missing-repository --skip-license -o "${{ steps.version.outputs.vsix_name }}"

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          VSCE_PUBLISHER: ${{ secrets.VSCE_PUBLISHER }}
        run: npx @vscode/vsce publish --packagePath "${{ steps.version.outputs.vsix_name }}" --publisher "$VSCE_PUBLISHER" --pat "$VSCE_PAT"

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.version.outputs.vsix_name }}
          generate_release_notes: true